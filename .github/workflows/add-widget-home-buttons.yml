name: Add Home button to every widget

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-widget-home-buttons.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-widgets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Insert shared Home button script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          marker = '<script src="../assets/widget-home-button.js"></script>'
          changed = []

          for path in sorted(Path('widgets').glob('*.html')):
              text = path.read_text(encoding='utf-8')
              if marker in text:
                  continue
              if '</body>' not in text.lower():
                  raise RuntimeError(f'Missing closing body tag: {path}')

              position = text.lower().rfind('</body>')
              updated = text[:position] + marker + '\n' + text[position:]
              path.write_text(updated, encoding='utf-8')
              changed.append(str(path))

          print(f'Updated {len(changed)} widget files:')
          for item in changed:
              print(f'  - {item}')
          PY

      - name: Commit widget updates and remove one-time workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-widget-home-buttons.yml
          git add widgets/*.html
          if git diff --cached --quiet; then
            echo "No widget changes were required."
            exit 0
          fi
          git commit -m "add Home button to every widget"
          git push
